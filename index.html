<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十二花神 · 本心测试</title>
    <!-- 字体与图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fdf3e9;
            font-family: 'Quicksand', sans-serif;
            color: #3d2c20;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 1.5rem 1rem;
            position: relative;
        }

        /* 背景花瓣纹理 */
        .petal-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg"><path d="M50 130 Q 30 100 55 75 Q 75 55 100 70" stroke="%23dbbca3" fill="none" stroke-width="1.5" opacity="0.25"/><circle cx="90" cy="90" r="18" fill="%23eacbb2" opacity="0.2"/><circle cx="130" cy="110" r="22" fill="%23dfb594" opacity="0.15"/><path d="M110 40 Q 135 55 125 85" stroke="%23cfa887" stroke-width="2" fill="none" opacity="0.2"/></svg>');
            background-repeat: repeat;
            background-size: 250px 250px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }

        .test-card {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 249, 240, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 3rem 3rem 2.5rem 2.5rem;
            box-shadow: 0 30px 50px rgba(150, 90, 50, 0.25), inset 0 2px 8px #fff2e3;
            border: 2px solid #efd5bf;
            padding: 2rem 2rem 2.5rem;
        }

        .title-section {
            text-align: center;
            margin-bottom: 2rem;
        }
        .title-section h1 {
            font-size: 3rem;
            font-weight: 600;
            color: #7a5b48;
            text-shadow: 3px 3px 0 #f5d5bc, 5px 7px 15px #b58e78;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .title-section h1 span {
            background: #b58b72;
            color: #fff7e7;
            font-size: 2rem;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 7px 0 #755b4b;
        }
        .subtitle {
            background: #fffcf7dd;
            padding: 0.4rem 2rem;
            border-radius: 40px;
            font-size: 1.3rem;
            color: #8a6652;
            display: inline-block;
            border: 1px solid #ebcfba;
        }

        /* 测试区 */
        .quiz-panel {
            background: #fffff9f0;
            border-radius: 2.5rem;
            padding: 2rem 2.2rem;
            border: 2px solid #e8ccb7;
            box-shadow: 0 10px 0 #b58f78, 0 8px 20px #d2af9b;
            margin: 1.8rem 0;
        }

        .q-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .q-progress {
            background: #ebd9cb;
            padding: 0.3rem 1.6rem;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .question-text {
            font-size: 1.9rem;
            font-weight: 600;
            color: #4e382a;
            margin-bottom: 2.2rem;
            padding-left: 1.2rem;
            border-left: 8px solid #ba8b72;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
        }
        .option-btn {
            background: #fff7ef;
            border: 2px solid #e7c5ae;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            font-size: 1.2rem;
            font-weight: 500;
            color: #423126;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 5px 0 #c9aa93, 0 3px 8px #d8b9a5;
            transition: all 0.15s;
        }
        .option-btn i {
            font-size: 1.5rem;
            color: #b3643f;
            width: 2rem;
            text-align: center;
        }
        .option-btn:hover {
            background: #ffe8da;
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #b58368, 0 8px 15px #dbb6a2;
        }
        .option-btn.selected {
            background: #ebccb8;
            border-color: #b46f4c;
            box-shadow: 0 3px 0 #975f44;
            transform: translateY(4px);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
        }
        .nav-btn {
            background: #fff9f0;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #634b3b;
            border: 1px solid #e1c1ab;
            box-shadow: 0 5px 0 #b58d76;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-btn:hover:not(:disabled) {
            background: #fff2e6;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #9e7561;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            box-shadow: 0 3px 0 #a69990;
            pointer-events: none;
        }
        .view-result-btn {
            background: #aa715a;
            color: #fff8ed;
            border: 1px solid #eccbb6;
            box-shadow: 0 6px 0 #633f30;
            font-size: 1.5rem;
            padding: 0.8rem 2.5rem;
        }

        /* 结果面板 - 严格按照图片格式 */
        .result-panel {
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.5rem;
            border: 3px solid #fbebdd;
            box-shadow: 0 20px 30px #ac8a7490, inset 0 0 0 2px #fffcf5;
            margin-top: 1.5rem;
            position: relative;
        }
        .result-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 245, 235, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
        }
        .result-content {
            position: relative;
            z-index: 2;
            background: #fffffff2;
            padding: 2rem 2.5rem;
            border-radius: 2rem;
            border: 1px solid #efcfb8;
            box-shadow: 0 10px 0 #ab846d;
        }
        
        /* 图片中的格式 - 小花标和人物 */
        .flower-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .flower-icon-small {
            font-size: 2.5rem;
            background: #f5e1d3;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #b68367;
            color: #9d5f42;
        }
        .flower-name {
            font-size: 2.2rem;
            font-weight: 700;
            color: #402e21;
        }
        
        .result-quote {
            font-size: 1.3rem;
            font-style: italic;
            color: #5f3e2e;
            background: #f7e9df;
            padding: 1.2rem 2rem;
            border-radius: 2rem;
            margin: 1.5rem 0;
            text-align: center;
            border: 1px solid #ecc3aa;
            line-height: 1.8;
        }
        .result-quote small {
            display: block;
            margin-top: 0.5rem;
            font-size: 1rem;
            color: #8b5e48;
        }
        
        .result-section {
            margin: 1.8rem 0;
        }
        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #633f30;
            margin-bottom: 0.8rem;
            border-left: 6px solid #c1785a;
            padding-left: 1rem;
        }
        .section-list {
            list-style: none;
            padding: 0 0.5rem;
        }
        .section-list li {
            font-size: 1.2rem;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }
        .section-list li i {
            color: #b46f4c;
            font-size: 1.3rem;
            width: 1.8rem;
        }
        .section-text {
            font-size: 1.2rem;
            line-height: 1.7;
            background: #fcf1e6;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            margin: 0.8rem 0;
        }
        .growth-box {
            background: #fff2e7;
            border: 2px solid #e6b595;
            border-radius: 1.5rem;
            padding: 1.2rem 1.8rem;
            margin: 1.2rem 0;
        }
        .growth-box p {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .qr-sim {
            background: #e9d9cd;
            height: 100px;
            width: 100px;
            border-radius: 50%;
            margin: 1rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #7a5b48;
            border: 3px solid #b58b72;
        }
        .stats {
            font-size: 1.2rem;
            background: #ecd7c7;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            text-align: center;
            margin: 1rem 0;
        }
        .footer-links {
            font-size: 1.2rem;
            color: #4b3527;
            background: #f3e4d9;
            padding: 1rem 1.8rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
        }

        .hidden {
            display: none !important;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #a68370;
            font-size: 1.2rem;
        }

        @media (max-width: 700px) {
            .options-grid { grid-template-columns: 1fr; }
            .question-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="petal-bg"></div>

<div class="test-card">
    <div class="title-section">
        <h1>
            <span>🌸</span> 十二花神 · 本心测试 <span>🌸</span>
        </h1>
        <div class="subtitle">三十六问 · 寻访花魂</div>
    </div>

    <!-- 测试区域（默认显示） -->
    <div id="quizSection">
        <div class="quiz-panel">
            <div class="q-meta">
                <div class="q-progress" id="progressText">第 1 / 36 题</div>
            </div>
            <div class="question-text" id="questionDisplay">加载题目中...</div>
            <div class="options-grid" id="optionsContainer"></div>

            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i> 上一题</button>
                <button class="nav-btn" id="nextBtn">下一题 <i class="fa-solid fa-chevron-right"></i></button>
                <button class="nav-btn view-result-btn" id="viewResultBtn">🌸 查看花神</button>
            </div>
        </div>
    </div>

    <!-- 结果展示区域（初始隐藏） -->
    <div id="resultSection" class="result-panel hidden">
        <div class="result-content" id="resultContent">
            <!-- 内容由JS动态生成，严格按照图片格式，包含小花标和人物 -->
        </div>
    </div>

    <footer>
        <i class="fa-regular fa-flower"></i> 百花各有其性 · 君属哪一仙 <i class="fa-regular fa-flower"></i>
    </footer>
</div>

<script>
    (function() {
        // ----- 36道题目 (选项已去掉花名) -----
        const questions = [
            // 梅花组
            { text: "遇到困难时，你的第一反应是——", options: [
                { text: "独自冷静分析，寻找解决方案", flower: "梅花" },
                { text: "找信任的人倾诉，寻求情感支持", flower: "杏花" },
                { text: "快速行动，在尝试中找到出路", flower: "桃花" },
                { text: "查阅资料，确保准备充分再行动", flower: "桂花" }
            ] },
            { text: "面对长期压力，你通常——", options: [
                { text: "默默坚持直到突破", flower: "梅花" },
                { text: "调整目标，寻找更轻松的替代方案", flower: "芙蓉" },
                { text: "把压力转化为动力，越挫越勇", flower: "牡丹" },
                { text: "制定详细计划，按部就班推进", flower: "山茶" }
            ] },
            { text: "在团队陷入混乱时，你更愿意——", options: [
                { text: "做定海神针，在混乱中保持冷静判断", flower: "梅花" },
                { text: "活跃气氛，带动团队情绪升温", flower: "桃花" },
                { text: "协调各方，寻找折中方案", flower: "芙蓉" },
                { text: "坚持原则，不因压力妥协底线", flower: "菊花" }
            ] },
            // 杏花组
            { text: "朋友向你倾诉烦恼时，你通常——", options: [
                { text: "深深共情，甚至能感受到对方的情绪重量", flower: "杏花" },
                { text: "理性分析，帮助对方找到解决办法", flower: "梅花" },
                { text: "分享类似经历，让TA知道不孤单", flower: "桃花" },
                { text: "默默陪伴，用行动表达关心", flower: "桂花" }
            ] },
            { text: "在社交场合，你更在意——", options: [
                { text: "氛围是否和谐，有没有人感到被冷落", flower: "杏花" },
                { text: "目标是否达成，效率是否足够高", flower: "葵花" },
                { text: "自己是否有存在感，能否展现魅力", flower: "牡丹" },
                { text: "能否建立深度连接，而非泛泛之交", flower: "荷花" }
            ] },
            { text: "当他人情绪激烈时，你——", options: [
                { text: "容易被感染，情绪随之起伏", flower: "杏花" },
                { text: "保持冷静，帮助对方平复", flower: "梅花" },
                { text: "用热情带动，转移注意力", flower: "桃花" },
                { text: "暂时回避，等冷静后再沟通", flower: "水仙" }
            ] },
            // 桃花组
            { text: "进入新环境，你通常——", options: [
                { text: "快速主动认识新朋友，扩大社交圈", flower: "桃花" },
                { text: "先观察一段时间，再决定深入交往", flower: "桂花" },
                { text: "找到关键人物，建立核心关系", flower: "牡丹" },
                { text: "保持自然，不刻意经营关系", flower: "菊花" }
            ] },
            { text: "你更享受哪种状态——", options: [
                { text: "被朋友环绕，热闹的聚会", flower: "桃花" },
                { text: "三五知己，深度的对话", flower: "荷花" },
                { text: "成为焦点，带动全场气氛", flower: "牡丹" },
                { text: "独处充电，享受宁静时光", flower: "水仙" }
            ] },
            { text: "表达情感时，你倾向于——", options: [
                { text: "直接热烈，让对方明确感受到", flower: "桃花" },
                { text: "含蓄内敛，用行动代替言语", flower: "菊花" },
                { text: "优雅得体，保持适当距离", flower: "桂花" },
                { text: "深思熟虑，确保真诚准确", flower: "荷花" }
            ] },
            // 牡丹组
            { text: "面对展示自我的机会，你通常——", options: [
                { text: "欣然接受，相信自己的价值", flower: "牡丹" },
                { text: "有些犹豫，担心准备不够完美", flower: "桂花" },
                { text: "先评估风险，再决定是否参与", flower: "芙蓉" },
                { text: "让更适合的人去，自己不抢风头", flower: "水仙" }
            ] },
            { text: "当他人质疑你的能力时，你——", options: [
                { text: "用事实和成果回应，证明给自己看", flower: "牡丹" },
                { text: "反思是否确实有改进空间", flower: "山茶" },
                { text: "理解对方立场，寻找共识", flower: "芙蓉" },
                { text: "坚持原则，不为他人的质疑动摇", flower: "菊花" }
            ] },
            { text: "你更认同哪种人生态度——", options: [
                { text: "敢于站在舞台中央，绽放光芒", flower: "牡丹" },
                { text: "甘当绿叶，在幕后默默成就他人", flower: "桂花" },
                { text: "灵活应变，在不同角色中切换", flower: "芙蓉" },
                { text: "淡泊名利，追求内心的平静", flower: "荷花" }
            ] },
            // 石榴组
            { text: "面对空白画布/新任务，你感到——", options: [
                { text: "兴奋，迫不及待想注入自己的创意", flower: "石榴" },
                { text: "谨慎，先研究成功案例再行动", flower: "山茶" },
                { text: "焦虑，担心无法达到预期", flower: "水仙" },
                { text: "平静，把它当作普通任务完成", flower: "菊花" }
            ] },
            { text: "你更享受创作过程的——", options: [
                { text: "灵感迸发的瞬间，想法喷涌而出", flower: "石榴" },
                { text: "精雕细琢的打磨，不断完善细节", flower: "水仙" },
                { text: "作品完成时，获得认可的满足", flower: "牡丹" },
                { text: "与他人协作，碰撞出新火花", flower: "桃花" }
            ] },
            { text: "当创意被否定时，你——", options: [
                { text: "迅速产生新想法，继续尝试", flower: "石榴" },
                { text: "坚持原有方案，争取说服对方", flower: "葵花" },
                { text: "理解反馈，调整方向再出发", flower: "芙蓉" },
                { text: "暂时搁置，等待合适时机", flower: "桂花" }
            ] },
            // 荷花组
            { text: "当周围喧嚣嘈杂时，你——", options: [
                { text: "感到烦躁，需要独处空间恢复平静", flower: "荷花" },
                { text: "不受影响，能专注于自己的事情", flower: "梅花" },
                { text: "尝试融入，参与热闹的活动", flower: "桃花" },
                { text: "观察他人，从中获取能量", flower: "杏花" }
            ] },
            { text: "做决定前，你通常——", options: [
                { text: "深思熟虑，确保内心真正认同", flower: "荷花" },
                { text: "快速决断，边做边调整", flower: "桃花" },
                { text: "收集信息，分析利弊后再定", flower: "桂花" },
                { text: "听从直觉，相信第一感觉", flower: "石榴" }
            ] },
            { text: "你更向往的生活状态——", options: [
                { text: "出淤泥而不染，保持精神独立", flower: "荷花" },
                { text: "融入烟火人间，体验丰富情感", flower: "杏花" },
                { text: "不断挑战，在变化中成长", flower: "芙蓉" },
                { text: "深耕一隅，建立稳固根基", flower: "山茶" }
            ] },
            // 葵花组
            { text: "一旦确定目标，你——", options: [
                { text: "像向日葵追日，全力以赴不动摇", flower: "葵花" },
                { text: "保持灵活，根据情况调整方向", flower: "芙蓉" },
                { text: "设定备选方案，以防万一", flower: "桂花" },
                { text: "顺其自然，不强求结果", flower: "菊花" }
            ] },
            { text: "面对'更好但不确定'的机会，你——", options: [
                { text: "坚持原有选择，完成比完美重要", flower: "葵花" },
                { text: "勇于转换赛道，拥抱新可能", flower: "石榴" },
                { text: "深入调研，用数据支撑决策", flower: "梅花" },
                { text: "咨询信任的人，参考他们的建议", flower: "杏花" }
            ] },

                quoteSrc: "——苏轼《和陈述古拒霜花》",
                desc: "你是应变自如的木芙蓉，拥有环境适应的弹性。一日三变，是你的生存智慧。",
                powers: [
                    "✅ 情境敏感 能快速读取环境需求并调整",
                    "✅ 角色切换 在不同场合展现合适面向",
                    "✅ 冲突调解 理解多方立场，寻找折中"
                ],
                shadows: [
                    "1. 自我模糊：适应太多，忘记自己原本的样子",
                    "2. 承诺困难：保持开放，难以做出坚定选择",
                    "3. 深度不足：广泛连接，但缺乏核心认同"
                ],
                growth: [
                    "🌺 试试：本周设定一个“不妥协”事项，练习坚定",
                    "🌺 试试：写下“我是谁”的10个定义，寻找恒定项",
                    "🌺 试试：选择一个方向，承诺深耕至少6个月"
                ],
                group: "芙蓉社",
                percent: "14%",
                desc1: "是灵活的“系统调节者”",
                readings: [],
                bg: "linear-gradient(145deg, #f5d6cd, #eab7aa)"
            },
            "山茶": {
                name: "山茶花神 · 王昭君",
                icon: "🌺",
                quote: "“东园三日雨兼风，桃李飘零扫地空。惟有山茶偏耐久，绿丛又放数枝红。”",
                quoteSrc: "——陆游《山茶》",
                desc: "你是耐冬守岁的山茶，拥有长期主义的定力。慢，是你的速度；久，是你的承诺。",
                powers: [
                    "✅ 持续投入 能在单一领域积累复利效应",
                    "✅ 延迟满足 抵御短期诱惑，专注长期目标",
                    "✅ 情绪稳定 波动较小，给人可靠感"
                ],
                shadows: [
                    "1. 变化恐惧：对不确定性感到焦虑，回避新可能",
                    "2. 沉没成本：为已投入时间，持续错误坚持",
                    "3. 当下缺失：永远为未来准备，忽视眼前生活"
                ],
                growth: [
                    "🌿 试试：本周尝试一件“无长期价值”的享乐活动",
                    "🌿 试试：设定“止损点”，练习适时放弃",
                    "🌿 试试：把“过程”本身也定义为成功的一部分"
                ],
                group: "山茶社",
                percent: "10%",
                desc1: "是可靠的“时间合伙人”",
                readings: [],
                bg: "linear-gradient(145deg, #f0d4c6, #dfaf9a)"
            },
            "水仙": {
                name: "水仙花神 · 宓妃",
                icon: "🌼",
                quote: "“凌波仙子生尘袜，水上轻盈步微月”",
                quoteSrc: "——黄庭坚《王充道送水仙花五十支》",
                desc: "你是清供案头的水仙，拥有自足的精神世界。一泓清水，便是一方天地。",
                powers: [
                    "✅ 独处丰盈 能从内在世界获得充足能量",
                    "✅ 深度思考 享受抽象概念和哲学追问",
                    "✅ 创造表达 通过艺术/文字表达内在体验"
                ],
                shadows: [
                    "1. 社交回避：过度独处导致孤立，错失连接",
                    "2. 现实脱节：沉浸内在世界，忽视实际事务",
                    "3. 自我封闭：把“独立”当作防御，拒绝支持"
                ],
                growth: [
                    "🌼 试试：本周主动发起一次线下见面，而非线上交流",
                    "🌼 试试：设定“最小社交配额”，每月至少2次",
                    "🌼 试试：找到一个能听懂你“内在语言”的人"
                ],
                group: "水仙社",
                percent: "8%",
                desc1: "是稀缺的“内在探索者”",
                readings: [],
                bg: "linear-gradient(145deg, #daeae5, #c5dbd4)"
            }
        };

        // 答案数组
        let answers = new Array(36).fill(null);
        let currentIdx = 0;

        // DOM
        const progressEl = document.getElementById('progressText');
        const questionEl = document.getElementById('questionDisplay');
        const optionsEl = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const viewBtn = document.getElementById('viewResultBtn');
        const resetBtn = document.getElementById('resetBtn');
        const quizSec = document.getElementById('quizSection');
        const resultSec = document.getElementById('resultSection');
        const resultContent = document.getElementById('resultContent');

        function renderQuestion(index) {
            const q = questions[index];
            progressEl.innerText = `第 ${index+1} / 36 题`;
            questionEl.innerText = q.text;

            let html = '';
            q.options.forEach(opt => {
                const selected = answers[index] === opt.flower ? 'selected' : '';
                html += `<div class="option-btn ${selected}" data-flower="${opt.flower}"><i class="fa-regular fa-circle"></i> ${opt.text}</div>`;
            });
            optionsEl.innerHTML = html;

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const flower = btn.dataset.flower;
                    optionsEl.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    answers[index] = flower;
                    updateNavButtons();
                });
            });
            updateNavButtons();
        }

        function updateNavButtons() {
            prevBtn.disabled = (currentIdx === 0);
            nextBtn.disabled = (currentIdx === 35);
            const allAnswered = answers.every(a => a != null);
            viewBtn.disabled = !allAnswered;
        }

        prevBtn.addEventListener('click', () => {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion(currentIdx);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIdx < 35) {
                currentIdx++;
                renderQuestion(currentIdx);
            }
        });

        function calculateTopFlower() {
            const scores = {};
            flowerOrder.forEach(f => scores[f] = 0);
            answers.forEach(f => { if (f && scores.hasOwnProperty(f)) scores[f]++; });

            let maxScore = -1;
            let bestFlower = flowerOrder[0];
            for (let f of flowerOrder) {
                if (scores[f] > maxScore) {
                    maxScore = scores[f];
                    bestFlower = f;
                }
            }
            return bestFlower;
        }

        function buildResultHTML(flower) {
            const d = flowerDetails[flower];
            if (!d) return '';

            let html = `
                <div class="flower-badge">
                    <div class="flower-icon-small">${d.icon}</div>
                    <div class="flower-name">${d.name}</div>
                </div>
                <div class="result-quote">${d.quote}<br><small>${d.quoteSrc}</small></div>
                <div class="section-text">${d.desc}</div>
                
                <div class="result-section">
                    <div class="section-title">【你的超能力】</div>
                    <ul class="section-list">
            `;
            d.powers.forEach(p => { html += `<li><i class="fa-regular fa-circle-check"></i> ${p}</li>`; });
            html += `</ul></div>`;

            html += `<div class="result-section"><div class="section-title">【花神阴影】</div><ul class="section-list">`;
            d.shadows.forEach(s => { html += `<li><i class="fa-regular fa-circle-exclamation"></i> ${s}</li>`; });
            html += `</ul></div>`;

            html += `<div class="result-section"><div class="section-title">【花神成长指南】</div><div class="growth-box">`;
            d.growth.forEach(g => { html += `<p><i class="fa-regular fa-snowflake"></i> ${g}</p>`; });
            html += `</div></div>`;

            html += `<div class="result-section"><div class="section-title">【加入${d.group}】</div>`;
            html += `<div class="qr-sim"><i class="fa-regular fa-qrcode"></i></div>`;
            html += `<div class="stats">扫码进入你的花神同伴群，找到同类。你们占总人口的${d.percent}，${d.desc1}</div>`;

            if (d.readings && d.readings.length > 0) {
                html += `<div class="footer-links">【延伸阅读】<br>`;
                d.readings.forEach(r => { html += `📚 ${r}<br>`; });
                html += `</div>`;
            }

            return html;
        }

        function showResult() {
            const topFlower = calculateTopFlower();
            const detail = flowerDetails[topFlower];
            resultContent.innerHTML = buildResultHTML(topFlower);
            resultSec.style.backgroundImage = detail.bg;

            quizSec.classList.add('hidden');
            resultSec.classList.remove('hidden');
        }

        viewBtn.addEventListener('click', () => {
            if (answers.every(a => a != null)) showResult();
            else alert('请先回答完所有36道题目，再召唤你的守护花神 ✿');
        });

        resetBtn.addEventListener('click', () => {
            answers = new Array(36).fill(null);
            currentIdx = 0;
            renderQuestion(0);
            quizSec.classList.remove('hidden');
            resultSec.classList.add('hidden');
        });

        renderQuestion(0);
    })();
</script>
</body>
</html>
