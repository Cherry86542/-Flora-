<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>十二花神 · 本心测试</title>
    <!-- 字体与图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        html {
            font-size: 16px;
        }

        body {
            background: #fdf3e9;
            font-family: 'Quicksand', sans-serif;
            color: #3d2c20;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        /* 背景花瓣纹理 */
        .petal-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg"><path d="M40 110 Q 25 85 45 65 Q 60 50 80 60" stroke="%23dbbca3" fill="none" stroke-width="1.5" opacity="0.25"/><circle cx="75" cy="75" r="15" fill="%23eacbb2" opacity="0.2"/><circle cx="110" cy="95" r="18" fill="%23dfb594" opacity="0.15"/><path d="M95 35 Q 115 45 105 70" stroke="%23cfa887" stroke-width="2" fill="none" opacity="0.2"/></svg>');
            background-repeat: repeat;
            background-size: 150px 150px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }

        .test-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 249, 240, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(150, 90, 50, 0.25), inset 0 2px 8px #fff2e3;
            border: 2px solid #efd5bf;
            padding: 20px 18px 25px;
            margin: 0 auto;
        }

        /* 启动页面样式 - 参考图片设计 */
        .splash-screen {
            text-align: center;
            padding: 30px 15px 20px;
        }

        .splash-title {
            font-size: clamp(2.5rem, 10vw, 3.5rem);
            font-weight: 700;
            color: #7a5b48;
            text-shadow: 3px 3px 0 #f5d5bc, 5px 7px 15px #b58e78;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .splash-subtitle {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: 600;
            color: #8a6652;
            margin-bottom: 40px;
            border-bottom: 2px dashed #dbaa8c;
            padding-bottom: 15px;
            display: inline-block;
        }

        .warning-box {
            background: #f7e9df;
            border: 2px solid #e6b595;
            border-radius: 20px;
            padding: 20px 15px;
            margin: 40px 0 30px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: #5f3e2e;
            line-height: 1.6;
            box-shadow: 0 5px 0 #c9aa93;
        }

        .warning-box i {
            color: #b46f4c;
            font-size: 1.5rem;
            margin-right: 8px;
        }

        .start-btn {
            background: #aa715a;
            color: #fff8ed;
            border: none;
            border-radius: 60px;
            padding: 18px 40px;
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: 700;
            box-shadow: 0 8px 0 #633f30;
            cursor: pointer;
            transition: all 0.1s;
            width: 100%;
            max-width: 280px;
            margin: 20px auto 30px;
            display: block;
            -webkit-tap-highlight-color: transparent;
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #633f30;
        }

        .splash-footer {
            font-size: clamp(0.9rem, 3.5vw, 1rem);
            color: #a68370;
            margin-top: 20px;
        }

        /* 原有测试页面样式 */
        .title-section {
            text-align: center;
            margin-bottom: 18px;
        }
        .title-section h1 {
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            font-weight: 600;
            color: #7a5b48;
            text-shadow: 2px 2px 0 #f5d5bc, 3px 4px 8px #b58e78;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .title-section h1 span {
            background: #b58b72;
            color: #fff7e7;
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            width: clamp(35px, 10vw, 45px);
            height: clamp(35px, 10vw, 45px);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #755b4b;
        }
        .subtitle {
            background: #fffcf7dd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            color: #8a6652;
            display: inline-block;
            border: 1px solid #ebcfba;
        }

        .quiz-panel {
            background: #fffff9f0;
            border-radius: 24px;
            padding: 18px 15px;
            border: 2px solid #e8ccb7;
            box-shadow: 0 6px 0 #b58f78, 0 4px 12px #d2af9b;
            margin: 15px 0;
        }

        .q-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 15px;
        }
        .q-progress {
            background: #ebd9cb;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: clamp(0.9rem, 3.5vw, 1rem);
            font-weight: 500;
        }

        .question-text {
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            font-weight: 600;
            color: #4e382a;
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 5px solid #ba8b72;
            line-height: 1.4;
            word-break: break-word;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .option-btn {
            background: #fff7ef;
            border: 2px solid #e7c5ae;
            border-radius: 50px;
            padding: 14px 16px;
            font-size: clamp(0.95rem, 4vw, 1.1rem);
            font-weight: 500;
            color: #423126;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 0 #c9aa93, 0 2px 6px #d8b9a5;
            transition: all 0.1s;
            min-height: 60px;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            word-break: break-word;
        }
        .option-btn i {
            font-size: clamp(1.2rem, 5vw, 1.4rem);
            color: #b3643f;
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }
        .option-btn:active {
            background: #ffe8da;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b58368;
        }
        .option-btn.selected {
            background: #ebccb8;
            border-color: #b46f4c;
            box-shadow: 0 2px 0 #975f44;
            transform: translateY(2px);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .nav-btn {
            background: #fff9f0;
            border: none;
            padding: 12px 16px;
            border-radius: 40px;
            font-size: clamp(1rem, 4vw, 1.1rem);
            font-weight: 600;
            color: #634b3b;
            border: 1px solid #e1c1ab;
            box-shadow: 0 4px 0 #b58d76;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            flex: 1 1 auto;
            min-width: 80px;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-btn:active:not(:disabled) {
            background: #fff2e6;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #9e7561;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            box-shadow: 0 2px 0 #a69990;
            pointer-events: none;
        }
        .view-result-btn {
            background: #aa715a;
            color: #fff8ed;
            border: 1px solid #eccbb6;
            box-shadow: 0 4px 0 #633f30;
            font-size: clamp(1.05rem, 4.5vw, 1.2rem);
            padding: 12px 20px;
            flex: 2 1 auto;
        }

        .result-panel {
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            border-radius: 24px;
            padding: 18px 15px 20px;
            border: 3px solid #fbebdd;
            box-shadow: 0 15px 25px #ac8a7490, inset 0 0 0 2px #fffcf5;
            margin-top: 10px;
            position: relative;
        }
        .result-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 245, 235, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 24px;
        }
        .result-content {
            position: relative;
            z-index: 2;
            background: #fffffff2;
            padding: 18px 15px;
            border-radius: 20px;
            border: 1px solid #efcfb8;
            box-shadow: 0 5px 0 #ab846d;
        }
        
        .flower-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .flower-icon-small {
            font-size: clamp(1.8rem, 7vw, 2.2rem);
            background: #f5e1d3;
            width: clamp(45px, 12vw, 55px);
            height: clamp(45px, 12vw, 55px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #b68367;
            color: #9d5f42;
            flex-shrink: 0;
        }
        .flower-name {
            font-size: clamp(1.3rem, 5.5vw, 1.7rem);
            font-weight: 700;
            color: #402e21;
            text-align: center;
            word-break: break-word;
        }
        
        .result-quote {
            font-size: clamp(0.95rem, 4vw, 1.1rem);
            font-style: italic;
            color: #5f3e2e;
            background: #f7e9df;
            padding: 14px 16px;
            border-radius: 20px;
            margin: 15px 0;
            text-align: center;
            border: 1px solid #ecc3aa;
            line-height: 1.5;
            word-break: break-word;
        }
        .result-quote small {
            display: block;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #8b5e48;
        }
        
        .result-section {
            margin: 18px 0;
        }
        .section-title {
            font-size: clamp(1.2rem, 5vw, 1.4rem);
            font-weight: 700;
            color: #633f30;
            margin-bottom: 10px;
            border-left: 5px solid #c1785a;
            padding-left: 12px;
        }
        .section-list {
            list-style: none;
            padding: 0 5px;
        }
        .section-list li {
            font-size: clamp(0.95rem, 4vw, 1.05rem);
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.5;
            word-break: break-word;
        }
        .section-list li i {
            color: #b46f4c;
            font-size: 1.1rem;
            width: 22px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .section-text {
            font-size: clamp(0.95rem, 4vw, 1.05rem);
            line-height: 1.7;
            background: #fcf1e6;
            padding: 14px 16px;
            border-radius: 16px;
            margin: 12px 0;
            word-break: break-word;
            text-align: justify;
        }
        .growth-box {
            background: #fff2e7;
            border: 2px solid #e6b595;
            border-radius: 20px;
            padding: 16px 18px;
            margin: 15px 0;
        }
        .growth-box p {
            font-size: clamp(0.95rem, 4vw, 1.05rem);
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.5;
            word-break: break-word;
        }
        .growth-box p i {
            flex-shrink: 0;
            margin-top: 2px;
        }
        .qr-sim {
            background: #ffffff;
            height: 120px;
            width: 120px;
            border-radius: 20px;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #2c1e16;
            border: 4px solid #b58b72;
            box-shadow: 0 5px 0 #7a5b48;
        }
        .qr-sim i {
            font-size: 3.5rem;
            color: #4a3729;
        }
        .stats {
            font-size: clamp(0.95rem, 4vw, 1.05rem);
            background: #ecd7c7;
            padding: 12px 16px;
            border-radius: 30px;
            text-align: center;
            margin: 15px 0;
            line-height: 1.5;
            word-break: break-word;
        }
        .footer-links {
            font-size: clamp(0.95rem, 4vw, 1.05rem);
            color: #4b3527;
            background: #f3e4d9;
            padding: 14px 18px;
            border-radius: 16px;
            margin-top: 18px;
            line-height: 1.6;
            word-break: break-word;
        }

        .hidden {
            display: none !important;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #a68370;
            font-size: clamp(0.85rem, 3.5vw, 0.95rem);
        }

        @media (max-width: 320px) {
            .test-card {
                padding: 15px 12px 20px;
            }
            .option-btn {
                padding: 12px 12px;
                min-height: 50px;
            }
            .nav-btn {
                padding: 10px 8px;
            }
        }

        @media (min-width: 768px) {
            .test-card {
                max-width: 600px;
            }
            .options-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="petal-bg"></div>

<div class="test-card">
    <!-- 启动页面 (默认显示) -->
    <div id="splashSection">
        <div class="splash-screen">
            <div class="splash-title">十二花神</div>
            <div class="splash-subtitle">你的守护花神</div>
            
            <div class="warning-box">
                <i class="fa-regular fa-circle-exclamation"></i>
                预警：个人能力有限，测试仅供参<br>考。
            </div>

            <button class="start-btn" id="startTestBtn">开始测试</button>

            <div class="splash-footer">十二花神</div>
        </div>
    </div>

    <!-- 测试区域（初始隐藏） -->
    <div id="quizSection" class="hidden">
        <div class="title-section">
            <h1>
                <span>🌸</span> 十二花神 · 本心测试 <span>🌸</span>
            </h1>
            <div class="subtitle">三十六问 · 寻访花魂</div>
        </div>

        <div class="quiz-panel">
            <div class="q-meta">
                <div class="q-progress" id="progressText">第 1 / 36 题</div>
            </div>
            <div class="question-text" id="questionDisplay">加载题目中...</div>
            <div class="options-grid" id="optionsContainer"></div>

            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i> 上一题</button>
                <button class="nav-btn" id="nextBtn">下一题 <i class="fa-solid fa-chevron-right"></i></button>
                <button class="nav-btn view-result-btn" id="viewResultBtn">🌸 查看花神</button>
            </div>
        </div>
    </div>

    <!-- 结果展示区域（初始隐藏） -->
    <div id="resultSection" class="result-panel hidden">
        <div class="result-content" id="resultContent">
            <!-- 内容由JS动态生成 -->
        </div>
    </div>

    <footer id="mainFooter" class="hidden">
        <i class="fa-regular fa-flower"></i> 百花各有其性 · 君属哪一仙 <i class="fa-regular fa-flower"></i>
    </footer>
</div>

<script>
    (function() {
        // 获取DOM元素
        const splashSection = document.getElementById('splashSection');
        const quizSection = document.getElementById('quizSection');
        const resultSection = document.getElementById('resultSection');
        const mainFooter = document.getElementById('mainFooter');
        const startBtn = document.getElementById('startTestBtn');

        // 开始测试按钮点击事件 - 修复版本：点击后立即加载第一题
        startBtn.addEventListener('click', () => {
            splashSection.classList.add('hidden');
            quizSection.classList.remove('hidden');
            mainFooter.classList.remove('hidden');
            
            // 立即加载第一题 - 这是修复的关键
            renderQuestion(0);
        });

        // ----- 以下为原有的测试逻辑 -----
        const questions = [
            // 梅花组
            { text: "遇到困难时，你的第一反应是——", options: [
                { text: "独自冷静分析，寻找解决方案", flower: "梅花" },
                { text: "找信任的人倾诉，寻求情感支持", flower: "杏花" },
                { text: "快速行动，在尝试中找到出路", flower: "桃花" },
                { text: "查阅资料，确保准备充分再行动", flower: "桂花" }
            ] },
            { text: "面对长期压力，你通常——", options: [
                { text: "默默坚持直到突破", flower: "梅花" },
                { text: "调整目标，寻找更轻松的替代方案", flower: "芙蓉" },
                { text: "把压力转化为动力，越挫越勇", flower: "牡丹" },
                { text: "制定详细计划，按部就班推进", flower: "山茶" }
            ] },
            { text: "在团队陷入混乱时，你更愿意——", options: [
                { text: "做定海神针，在混乱中保持冷静判断", flower: "梅花" },
                { text: "活跃气氛，带动团队情绪升温", flower: "桃花" },
                { text: "协调各方，寻找折中方案", flower: "芙蓉" },
                { text: "坚持原则，不因压力妥协底线", flower: "菊花" }
            ] },
            // 杏花组
            { text: "朋友向你倾诉烦恼时，你通常——", options: [
                { text: "深深共情，甚至能感受到对方的情绪重量", flower: "杏花" },
                { text: "理性分析，帮助对方找到解决办法", flower: "梅花" },
                { text: "分享类似经历，让TA知道不孤单", flower: "桃花" },
                { text: "默默陪伴，用行动表达关心", flower: "桂花" }
            ] },
            { text: "在社交场合，你更在意——", options: [
                { text: "氛围是否和谐，有没有人感到被冷落", flower: "杏花" },
                { text: "目标是否达成，效率是否足够高", flower: "葵花" },
                { text: "自己是否有存在感，能否展现魅力", flower: "牡丹" },
                { text: "能否建立深度连接，而非泛泛之交", flower: "荷花" }
            ] },
            { text: "当他人情绪激烈时，你——", options: [
                { text: "容易被感染，情绪随之起伏", flower: "杏花" },
                { text: "保持冷静，帮助对方平复", flower: "梅花" },
                { text: "用热情带动，转移注意力", flower: "桃花" },
                { text: "暂时回避，等冷静后再沟通", flower: "水仙" }
            ] },
            // 桃花组
            { text: "进入新环境，你通常——", options: [
                { text: "快速主动认识新朋友，扩大社交圈", flower: "桃花" },
                { text: "先观察一段时间，再决定深入交往", flower: "桂花" },
                { text: "找到关键人物，建立核心关系", flower: "牡丹" },
                { text: "保持自然，不刻意经营关系", flower: "菊花" }
            ] },
            { text: "你更享受哪种状态——", options: [
                { text: "被朋友环绕，热闹的聚会", flower: "桃花" },
                { text: "三五知己，深度的对话", flower: "荷花" },
                { text: "成为焦点，带动全场气氛", flower: "牡丹" },
                { text: "独处充电，享受宁静时光", flower: "水仙" }
            ] },
            { text: "表达情感时，你倾向于——", options: [
                { text: "直接热烈，让对方明确感受到", flower: "桃花" },
                { text: "含蓄内敛，用行动代替言语", flower: "菊花" },
                { text: "优雅得体，保持适当距离", flower: "桂花" },
                { text: "深思熟虑，确保真诚准确", flower: "荷花" }
            ] },
            // 牡丹组
            { text: "面对展示自我的机会，你通常——", options: [
                { text: "欣然接受，相信自己的价值", flower: "牡丹" },
                { text: "有些犹豫，担心准备不够完美", flower: "桂花" },
                { text: "先评估风险，再决定是否参与", flower: "芙蓉" },

        let answers = new Array(36).fill(null);
        let currentIdx = 0;

        const progressEl = document.getElementById('progressText');
        const questionEl = document.getElementById('questionDisplay');
        const optionsEl = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const viewBtn = document.getElementById('viewResultBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultContent = document.getElementById('resultContent');

        function renderQuestion(index) {
            const q = questions[index];
            progressEl.innerText = `第 ${index+1} / 36 题`;
            questionEl.innerText = q.text;

            let html = '';
            q.options.forEach(opt => {
                const selected = answers[index] === opt.flower ? 'selected' : '';
                html += `<div class="option-btn ${selected}" data-flower="${opt.flower}"><i class="fa-regular fa-circle"></i> ${opt.text}</div>`;
            });
            optionsEl.innerHTML = html;

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const flower = btn.dataset.flower;
                    optionsEl.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    answers[index] = flower;
                    updateNavButtons();
                });
            });
            updateNavButtons();
        }

        function updateNavButtons() {
            prevBtn.disabled = (currentIdx === 0);
            nextBtn.disabled = (currentIdx === 35);
            const allAnswered = answers.every(a => a != null);
            viewBtn.disabled = !allAnswered;
        }

        prevBtn.addEventListener('click', () => {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion(currentIdx);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIdx < 35) {
                currentIdx++;
                renderQuestion(currentIdx);
            }
        });

        function calculateTopFlower() {
            const scores = {};
            flowerOrder.forEach(f => scores[f] = 0);
            answers.forEach(f => { if (f && scores.hasOwnProperty(f)) scores[f]++; });

            let maxScore = -1;
            let bestFlower = flowerOrder[0];
            for (let f of flowerOrder) {
                if (scores[f] > maxScore) {
                    maxScore = scores[f];
                    bestFlower = f;
                }
            }
            return bestFlower;
        }

        function buildResultHTML(flower) {
            const d = flowerDetails[flower];
            if (!d) return '';

            let html = `
                <div class="flower-badge">
                    <div class="flower-icon-small">${d.icon}</div>
                    <div class="flower-name">${d.name}</div>
                </div>
                <div class="result-quote">${d.quote}<br><small>${d.quoteSrc}</small></div>
                <div class="section-text">${d.desc}</div>
                
                <div class="result-section">
                    <div class="section-title">【你的超能力】</div>
                    <ul class="section-list">
            `;
            d.powers.forEach(p => { html += `<li><i class="fa-regular fa-circle-check"></i> ${p}</li>`; });
            html += `</ul></div>`;

            html += `<div class="result-section"><div class="section-title">【花神阴影】</div><ul class="section-list">`;
            d.shadows.forEach(s => { html += `<li><i class="fa-regular fa-circle-exclamation"></i> ${s}</li>`; });
            html += `</ul></div>`;

            html += `<div class="result-section"><div class="section-title">【花神成长指南】</div><div class="growth-box">`;
            d.growth.forEach(g => { html += `<p><i class="fa-regular fa-snowflake"></i> ${g}</p>`; });
            html += `</div></div>`;

            html += `<div class="result-section"><div class="section-title">【加入${d.group}】</div>`;
            html += `<div class="qr-sim"><i class="fa-regular fa-qrcode"></i></div>`;
            html += `<div class="stats">扫码进入你的花神同伴群，找到同类。你们占总人口的${d.percent}，${d.desc1}</div>`;

            if (d.readings && d.readings.length > 0) {
                html += `<div class="footer-links">【延伸阅读】<br>`;
                d.readings.forEach(r => { html += `📚 ${r}<br>`; });
                html += `</div>`;
            }

            return html;
        }

        function showResult() {

            resultContent.innerHTML = buildResultHTML(topFlower);
            resultSection.style.backgroundImage = detail.bg;

            quizSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
        }

        viewBtn.addEventListener('click', () => {
            if (answers.every(a => a != null)) showResult();
            else alert('请先回答完所有36道题目，再召唤你的守护花神 ✿');
        });

        resetBtn.addEventListener('click', () => {
            answers = new Array(36).fill(null);
            currentIdx = 0;
            renderQuestion(0);
            quizSection.classList.remove('hidden');
            resultSection.classList.add('hidden');
            splashSection.classList.add('hidden');
            mainFooter.classList.remove('hidden');
        });

        // 注意：这里已经删除了有问题的setTimeout代码
        // 第一题现在会在点击开始按钮时立即加载
    })();
</script>
</body>
</html>
